<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajay Kumar Rao</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:#f8f9fb;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#fff;
}

.logo{
font-weight:bold;
font-size:22px;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
text-decoration:none;
color:#555;
font-size:14px;
}

.btn{
padding:8px 15px;
border:1px solid #ccc;
background:#fff;
cursor:pointer;
}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:80px 8%;
min-height:90vh;
}

/* LEFT */
.hero-text span{
font-size:12px;
letter-spacing:2px;
color:#888;
}

.hero-text h1{
font-size:42px;
margin:10px 0;
}

.hero-text h1 span{
color:#d8a86d;
}

.hero-text h2{
font-size:38px;
font-weight:bold;
color:#1a2b49;
margin-bottom:15px;
}

.hero-text p{
color:#666;
font-size:14px;
margin-bottom:20px;
max-width:400px;
}

.buttons{
display:flex;
gap:10px;
}

.btn-primary{
background:#1a2b49;
color:#fff;
border:none;
}

.btn-secondary{
border:1px solid #ccc;
background:#fff;
}

/* RIGHT */
.hero-img{
position:relative;
}

.hero-img::before{
content:'';
position:absolute;
right:-80px;
top:-60px;
width:520px;
height:520px;
background:#1f4d4d;
border-radius:50%;
z-index:-1;
}

.hero-img img{
width:420px;
height:420px;
object-fit:cover;
border-radius:50%;
border:5px solid #fff;
}

/* MOBILE */
@media(max-width:900px){
.hero{
flex-direction:column;
text-align:center;
}
.hero-img{
margin-top:30px;
}
}
</style>

</head>

<body>

<nav>
<div class="logo">GRAFIK</div>
<ul>
<li>HOME</li>
<li>ABOUT</li>
<li>SERVICES</li>
<li>PORTFOLIO</li>
</ul>
<button class="btn">Get Started</button>
</nav>

<section class="hero">

<div class="hero-text">
<span>— HELLO</span>
<h1>I'm <span>Ajay</span></h1>
<h2>Graphic Designer</h2>

<p>
Creative graphic designer focused on modern UI, branding, and clean design experiences.
</p>

<div class="buttons">
<button class="btn btn-primary">Let's Talk</button>
<button class="btn btn-secondary">Learn More</button>
</div>
</div>

<div class="hero-img">
<img src="ajay.png">
</div>

</section>

</body>
</html>
