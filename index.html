<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajay Kumar Rao - Portfolio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:#f8f9fb;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#fff;
}

.logo{
font-size:22px;
font-weight:bold;
color:#222;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
text-decoration:none;
color:#555;
font-size:14px;
}

.btn{
padding:8px 15px;
border:1px solid #ccc;
background:#fff;
cursor:pointer;
}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:80px 8%;
min-height:90vh;
}

/* LEFT */
.hero-text{
max-width:500px;
}

.hero-text span{
font-size:14px;
letter-spacing:2px;
color:#888;
}

.hero-text h1{
font-size:42px;
margin:10px 0;
}

.hero-text h1 span{
color:#e6b980;
}

.hero-text h2{
font-size:36px;
font-weight:bold;
color:#1a2b49;
margin-bottom:15px;
}

.hero-text p{
font-size:14px;
color:#666;
margin-bottom:20px;
}

.buttons{
display:flex;
gap:10px;
}

.btn-primary{
background:#1a2b49;
color:#fff;
border:none;
}

.btn-secondary{
background:#fff;
border:1px solid #ccc;
}

/* RIGHT IMAGE */
.hero-img{
position:relative;
}

.hero-img::before{
content:'';
position:absolute;
top:-50px;
right:-50px;
width:450px;
height:450px;
background:#1f4d4d;
border-radius:50%;
z-index:-1;
}

.hero-img img{
width:300px;
border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
.hero{
flex-direction:column;
text-align:center;
}
.hero-img{
margin-top:30px;
}
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">GRAFIK</div>
<ul>
<li><a href="#">HOME</a></li>
<li><a href="#">ABOUT</a></li>
<li><a href="#">SERVICES</a></li>
<li><a href="#">PORTFOLIO</a></li>
</ul>
<button class="btn">Get Started</button>
</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-text">
<span>— HELLO</span>
<h1>I'm <span>Ajay</span></h1>
<h2>Graphic Designer</h2>

<p>
Creative graphic designer focused on modern UI, branding, and clean design experiences.
</p>

<div class="buttons">
<button class="btn btn-primary">Let's Talk</button>
<button class="btn btn-secondary">Learn More</button>
</div>

</div>

<div class="hero-img">
<!-- YAHAN APNI PHOTO DALNA -->
<img src="ajay.jpg"> alt="profile">
</div>

</section>

</body>
</html>
